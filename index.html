<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Arácnida</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #0d1b6e 0%, #0a0a0a 50%, #6b0000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bangers', sans-serif;
      overflow: hidden;
    }

    /* ── Telaraña de fondo ── */
    .web-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.1;
      z-index: 0;
    }

    /* ── Tarjeta principal ── */
    .card {
      position: relative;
      z-index: 2;
      background: linear-gradient(160deg, #0f1f7a 0%, #1a0000 100%);
      border: 3px solid #e00;
      border-radius: 24px;
      padding: 40px 36px 36px;
      max-width: 520px;
      width: 94%;
      text-align: center;
      box-shadow: 0 0 60px rgba(200,0,0,0.45), inset 0 0 40px rgba(0,0,80,0.3);
    }

    /* ── Logo SVG Spider-Man ── */
    .spider-logo {
      display: block;
      margin: 0 auto 24px;
      filter: drop-shadow(0 0 16px #e00);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 12px #e00); transform: scale(1); }
      50%      { filter: drop-shadow(0 0 28px #ff4444); transform: scale(1.05); }
    }

    /* ── Texto ── */
    .pregunta {
      font-size: 2rem;
      letter-spacing: 2px;
      color: #fff;
      text-shadow: 2px 2px 0 #c00, -1px -1px 0 #002299;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .pregunta .gold { color: #ffd700; }

    .sub {
      font-size: 1.15rem;
      color: #aac0ff;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    /* ── Divisor telaraña ── */
    .divider {
      margin: 0 auto 28px;
      display: block;
    }

    /* ── Botones ── */
    .btns {
      display: flex;
      gap: 20px;
      justify-content: center;
      position: relative;
      height: 60px;
      align-items: center;
    }

    button {
      font-family: 'Bangers', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 2px;
      padding: 12px 44px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-si {
      background: linear-gradient(135deg, #1db954, #0e7a33);
      color: #fff;
      box-shadow: 0 4px 20px rgba(30,185,84,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-si:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 28px rgba(30,185,84,0.75);
    }

    .btn-no {
      background: linear-gradient(135deg, #cc0000, #7a0000);
      color: #fff;
      box-shadow: 0 4px 20px rgba(200,0,0,0.5);
    }

    /* ── Hint ── */
    .hint {
      margin-top: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    /* ── Pantalla de éxito ── */
    .success { display: none; flex-direction: column; align-items: center; gap: 16px; }

    .success-title {
      font-size: 2.4rem;
      color: #ffd700;
      text-shadow: 3px 3px 0 #c00;
      letter-spacing: 3px;
    }

    .success-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.8);
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      top: -20px;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 999;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Arañita decorativa ── */
    .spider-deco {
      animation: swing 3s ease-in-out infinite;
      transform-origin: top center;
      display: block;
      margin: 0 auto 10px;
    }

    @keyframes swing {
      0%,100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }
  </style>
</head>
<body>

<!-- Telaraña de fondo -->
<svg class="web-bg" viewBox="0 0 800 700" xmlns="http://www.w3.org/2000/svg">
  <g stroke="#fff" stroke-width="0.8" fill="none">
    <line x1="400" y1="350" x2="0"   y2="0"/>
    <line x1="400" y1="350" x2="200" y2="0"/>
    <line x1="400" y1="350" x2="400" y2="0"/>
    <line x1="400" y1="350" x2="600" y2="0"/>
    <line x1="400" y1="350" x2="800" y2="0"/>
    <line x1="400" y1="350" x2="800" y2="175"/>
    <line x1="400" y1="350" x2="800" y2="350"/>
    <line x1="400" y1="350" x2="800" y2="525"/>
    <line x1="400" y1="350" x2="800" y2="700"/>
    <line x1="400" y1="350" x2="600" y2="700"/>
    <line x1="400" y1="350" x2="400" y2="700"/>
    <line x1="400" y1="350" x2="200" y2="700"/>
    <line x1="400" y1="350" x2="0"   y2="700"/>
    <line x1="400" y1="350" x2="0"   y2="525"/>
    <line x1="400" y1="350" x2="0"   y2="350"/>
    <line x1="400" y1="350" x2="0"   y2="175"/>
    <ellipse cx="400" cy="350" rx="70"  ry="70"/>
    <ellipse cx="400" cy="350" rx="140" ry="140"/>
    <ellipse cx="400" cy="350" rx="210" ry="210"/>
    <ellipse cx="400" cy="350" rx="280" ry="280"/>
    <ellipse cx="400" cy="350" rx="350" ry="350"/>
    <ellipse cx="400" cy="350" rx="420" ry="420"/>
    <ellipse cx="400" cy="350" rx="490" ry="490"/>
  </g>
</svg>

<!-- Tarjeta -->
<div class="card" id="card">

  <!-- Pantalla principal -->
  <div id="main">

    <!-- Arañita colgante SVG -->
    <svg class="spider-deco" width="48" height="80" viewBox="0 0 48 80" xmlns="http://www.w3.org/2000/svg">
      <!-- hilo -->
      <line x1="24" y1="0" x2="24" y2="28" stroke="#aaa" stroke-width="1.5"/>
      <!-- cuerpo -->
      <ellipse cx="24" cy="38" rx="10" ry="13" fill="#111" stroke="#e00" stroke-width="1.5"/>
      <!-- cabeza -->
      <circle cx="24" cy="26" r="7" fill="#111" stroke="#e00" stroke-width="1.5"/>
      <!-- ojos -->
      <ellipse cx="21" cy="25" rx="2.5" ry="2" fill="#fff"/>
      <ellipse cx="27" cy="25" rx="2.5" ry="2" fill="#fff"/>
      <circle cx="21" cy="25" r="1" fill="#e00"/>
      <circle cx="27" cy="25" r="1" fill="#e00"/>
      <!-- patas izquierda -->
      <line x1="14" y1="34" x2="2"  y2="28" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="38" x2="0"  y2="38" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="42" x2="2"  y2="50" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <!-- patas derecha -->
      <line x1="34" y1="34" x2="46" y2="28" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="34" y1="38" x2="48" y2="38" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="34" y1="42" x2="46" y2="50" stroke="#e00" stroke-width="1.5" stroke-linecap="round"/>
      <!-- marca pecho -->
      <path d="M20,33 Q24,29 28,33 Q24,38 20,33Z" fill="#e00"/>
    </svg>

    <!-- Logo Spider-Man SVG -->
    <svg class="spider-logo" width="200" height="90" viewBox="0 0 200 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Forma de araña / escudo -->
      <path d="M100,5 C60,5 20,30 10,60 C20,50 40,45 60,55 C70,35 85,25 100,25
               C115,25 130,35 140,55 C160,45 180,50 190,60
               C180,30 140,5 100,5Z" fill="#c00"/>
      <path d="M60,55 C70,35 85,25 100,25 C115,25 130,35 140,55
               C125,50 112,48 100,48 C88,48 75,50 60,55Z" fill="#e00"/>
      <!-- Ojos blancos -->
      <ellipse cx="72"  cy="52" rx="16" ry="11" fill="white" transform="rotate(-15,72,52)"/>
      <ellipse cx="128" cy="52" rx="16" ry="11" fill="white" transform="rotate(15,128,52)"/>
      <!-- Cuerpo inferior -->
      <path d="M60,55 C75,50 88,48 100,48 C112,48 125,50 140,55
               C138,75 120,88 100,88 C80,88 62,75 60,55Z" fill="#b00"/>
      <!-- Líneas del traje -->
      <line x1="100" y1="48" x2="100" y2="88" stroke="#e00" stroke-width="1.5"/>
      <line x1="60"  y1="55" x2="140" y2="55" stroke="#e00" stroke-width="1"/>
      <line x1="65"  y1="65" x2="135" y2="65" stroke="#e00" stroke-width="0.8"/>
      <line x1="70"  y1="75" x2="130" y2="75" stroke="#e00" stroke-width="0.6"/>
    </svg>

    <div class="pregunta">¿Quieres ir a ver<br><span class="gold">Spider-Man:</span><br>Brand New Day conmigo?</div>
    <div class="sub">🕸️ Una cita arácnida te espera 🕷️</div>

    <!-- Divisor telaraña pequeño -->
    <svg class="divider" width="260" height="18" viewBox="0 0 260 18" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="9" x2="260" y2="9" stroke="#e00" stroke-width="0.8" opacity="0.4"/>
      <circle cx="130" cy="9" r="4" fill="#e00"/>
      <circle cx="100" cy="9" r="2" fill="#e00" opacity="0.6"/>
      <circle cx="160" cy="9" r="2" fill="#e00" opacity="0.6"/>
      <circle cx="70"  cy="9" r="1.5" fill="#e00" opacity="0.3"/>
      <circle cx="190" cy="9" r="1.5" fill="#e00" opacity="0.3"/>
    </svg>

    <div class="btns">
      <button class="btn-si" id="btn-si">¡SÍ!</button>
      <button class="btn-no" id="btn-no">No</button>
    </div>
    <p class="hint">el botón rojo es esquivo... como Spider-Man</p>
  </div>

  <!-- Pantalla de éxito -->
  <div class="success" id="success">
    <!-- Checkmark con telaraña -->
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"
         style="filter:drop-shadow(0 0 16px #1db954)">
      <circle cx="50" cy="50" r="46" fill="none" stroke="#1db954" stroke-width="4"/>
      <polyline points="25,52 43,68 75,34" fill="none" stroke="#1db954" stroke-width="5"
                stroke-linecap="round" stroke-linejoin="round"/>
    </svg>

    <div class="success-title">¡SABÍA QUE SÍ! 🎉</div>

    <!-- Araña feliz -->
    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"
         style="filter:drop-shadow(0 0 8px #e00)">
      <ellipse cx="40" cy="52" rx="18" ry="22" fill="#c00"/>
      <circle  cx="40" cy="30" r="14" fill="#c00"/>
      <ellipse cx="33" cy="28" rx="5" ry="4" fill="white"/>
      <ellipse cx="47" cy="28" rx="5" ry="4" fill="white"/>
      <circle  cx="33" cy="28" r="2" fill="#111"/>
      <circle  cx="47" cy="28" r="2" fill="#111"/>
      <!-- sonrisa -->
      <path d="M32,38 Q40,44 48,38" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
      <!-- patas -->
      <line x1="22" y1="46" x2="4"  y2="36" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="22" y1="52" x2="2"  y2="52" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="22" y1="58" x2="4"  y2="68" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="58" y1="46" x2="76" y2="36" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="58" y1="52" x2="78" y2="52" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="58" y1="58" x2="76" y2="68" stroke="#c00" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M30,48 Q40,43 50,48 Q40,56 30,48Z" fill="#fff" opacity="0.8"/>
    </svg>

    <div class="sub" style="color:#ffd700;font-size:1.3rem">Prepárate para la mejor<br>cita arácnida 🕷️</div>
    <p class="success-sub">Con telarañas y canchita,<br>esta película va a ser <strong>perfecta</strong>.</p>
  </div>

</div>

<script>
  const btnNo  = document.getElementById('btn-no');
  const btnSi  = document.getElementById('btn-si');
  const main   = document.getElementById('main');
  const success = document.getElementById('success');

  let escaped = false;

  function moveBtn(e) {
    if (!escaped) {
      escaped = true;
      btnNo.style.position   = 'fixed';
      btnNo.style.transition = 'left 0.12s, top 0.12s';
      btnNo.style.zIndex     = '999';
    }

    const W  = window.innerWidth,  H  = window.innerHeight;
    const bw = btnNo.offsetWidth || 100, bh = btnNo.offsetHeight || 52;

    let nx = Math.random() * (W - bw - 20) + 10;
    let ny = Math.random() * (H - bh - 20) + 10;

    if (e && e.clientX != null) {
      const cx = e.clientX, cy = e.clientY;
      if (Math.abs(nx - cx) < 150) nx = cx + (nx > cx ? 170 : -170);
      if (Math.abs(ny - cy) < 80)  ny = cy + (ny > cy ? 90  : -90);
      nx = Math.max(10, Math.min(W - bw - 10, nx));
      ny = Math.max(10, Math.min(H - bh - 10, ny));
    }

    btnNo.style.left = nx + 'px';
    btnNo.style.top  = ny + 'px';
  }

  btnNo.addEventListener('mouseover', moveBtn);

  document.addEventListener('mousemove', function(ev) {
    if (!escaped) return;
    const r    = btnNo.getBoundingClientRect();
    const dist = Math.hypot(ev.clientX - (r.left + r.width / 2),
                            ev.clientY - (r.top  + r.height / 2));
    if (dist < 130) moveBtn(ev);
  });

  btnNo.addEventListener('touchstart', function(e) {
    e.preventDefault();
    moveBtn({});
  });

  function launchConfetti() {
    const colors = ['#ff0000','#ffd700','#00aaff','#ffffff','#ff69b4','#00ff88','#cc0000'];
    for (let i = 0; i < 90; i++) {
      const el = document.createElement('div');
      el.className            = 'confetti-piece';
      el.style.left            = Math.random() * 100 + '%';
      el.style.background      = colors[Math.floor(Math.random() * colors.length)];
      el.style.width           = (7  + Math.random() * 9) + 'px';
      el.style.height          = (7  + Math.random() * 9) + 'px';
      el.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
      el.style.animationDelay  = (Math.random() * 0.9) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  btnSi.addEventListener('click', function() {
    if (escaped) btnNo.remove();
    launchConfetti();
    main.style.display    = 'none';
    success.style.display = 'flex';
  });
</script>
</body>
</html>
